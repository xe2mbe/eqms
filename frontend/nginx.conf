server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de seguridad basicos, aplicados a toda respuesta.
    include /etc/nginx/security-headers.conf;
    # No se agrega Content-Security-Policy: con AntD/ECharts hay riesgo real de
    # romper estilos/scripts inline sin una auditoria dedicada. Queda pendiente.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html siempre se revalida: cada deploy debe reflejarse de inmediato.
    location = /index.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    # Bundles de Vite (JS/CSS con hash en el nombre): cache largo e inmutable.
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    # Estaticos sueltos de public/ (favicon, logos, mexico-states.json) sin hash
    # en el nombre: cache moderado, no immutable, para que un cambio se refleje
    # en dias y no en un anio.
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?|json)$ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public";
        expires 7d;
    }

    # Proxy al backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Archivos estáticos (avatares, uploads)
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
