# Headers de seguridad basicos. Se incluye explicitamente en el bloque server
# y en cada location que define su propio add_header, porque nginx NO hereda
# add_header del nivel padre cuando el nivel hijo define alguno propio.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;
