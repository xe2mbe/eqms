name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 138.122.96.71
          port: 65022
          username: xe2n
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/eqms
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
            echo "=== Contenedores corriendo ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Logs recientes frontend ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs frontend --tail 20
            echo "=== Nginx host (fuera de Docker) ==="
            cat /etc/nginx/sites-enabled/* 2>/dev/null || cat /etc/nginx/conf.d/*.conf 2>/dev/null || echo "No se encontro config nginx"
            echo "=== Procesos escuchando en 443 y 80 ==="
            ss -tlnp | grep -E ':80|:443'
