name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qmsdb_test
          POSTGRES_USER: quser
          POSTGRES_PASSWORD: qpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quser -d qmsdb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Ejecutar pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://quser:qpassword@localhost:5432/qmsdb_test
          SECRET_KEY: clave-de-pruebas-solo-para-ci-1234567890abcdef
          DEBUG: "true"
          ALLOWED_ORIGINS: http://localhost:5173
        run: pytest tests -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci
      - name: Typecheck + build (tsc && vite build)
        working-directory: frontend
        run: npm run build

  deploy:
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 138.122.96.71
          port: 65022
          username: xe2n
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/eqms
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
            echo "=== Contenedores corriendo ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Logs recientes frontend ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs frontend --tail 20
            echo "=== Apache sites-enabled ==="
            ls /etc/apache2/sites-enabled/ 2>/dev/null
            cat /etc/apache2/sites-enabled/*.conf 2>/dev/null || cat /etc/apache2/sites-enabled/* 2>/dev/null || echo "sin acceso"
            echo "=== Apache DocumentRoot ==="
            grep -r "DocumentRoot\|ProxyPass\|299085\|eqms" /etc/apache2/ 2>/dev/null || echo "sin acceso"
